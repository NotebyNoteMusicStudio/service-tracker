<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --navy:#1B3A5C; --teal:#9ED5C5; --cream:#F8F5F0;
  --ink:#22303d; --muted:#6b7a88; --white:#ffffff;
  --red:#c0574f; --amber:#d9a441; --green:#3f8f6b;
  --radius:14px; --shadow:0 2px 10px rgba(27,58,92,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif;color:var(--navy)}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:10px;font-size:15px}
input,select,textarea{font-family:'DM Sans',sans-serif;font-size:15px;padding:10px 12px;border:1.5px solid #d8dee4;border-radius:10px;background:var(--white);width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);border-color:var(--teal)}
label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin:12px 0 4px}
.btn{background:var(--navy);color:var(--white);padding:11px 20px;font-weight:500}
.btn:hover{background:#254a72}
.btn-teal{background:var(--teal);color:var(--navy);font-weight:700}
.btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:13px}
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
.pill.scheduled{background:#e4edf5;color:var(--navy)}
.pill.completed{background:#e0f2ea;color:var(--green)}
.pill.canceled{background:#f6e3e1;color:var(--red)}
.pill.rescheduled{background:#faf0dc;color:#9a742a}
.pill.needs_reschedule{background:#fdeecd;color:#9a5f16}
.pill.trial{background:var(--teal);color:var(--navy)}
.grid{display:grid;gap:14px}
.stat{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center}
.stat .n{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--navy)}
.stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:8px 10px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--cream)}
td{padding:10px;border-bottom:1px solid var(--cream);vertical-align:middle}
.tablewrap{overflow-x:auto}
/* ---------- shell ---------- */
#topbar{background:var(--navy);color:var(--white);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
#topbar .brand{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
#topbar .brand span{color:var(--teal)}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:transparent;color:#cfdbe6;padding:8px 14px;border-radius:8px;font-size:14px}
nav button.active,nav button:hover{background:rgba(158,213,197,.18);color:var(--teal)}
#main{max-width:1080px;margin:0 auto;padding:24px 16px 80px}
.pagehead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
.hidden{display:none!important}
/* ---------- auth ---------- */
#authView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,var(--cream) 60%,#e8f3ee)}
.authcard{background:var(--white);border-radius:18px;box-shadow:0 8px 40px rgba(27,58,92,.14);padding:36px;width:100%;max-width:420px}
.authcard h1{font-size:26px;margin-bottom:4px}
.authcard .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
.authcard .btn{width:100%;margin-top:18px}
.authlinks{margin-top:14px;text-align:center;font-size:13px}
.authlinks a{color:var(--navy);cursor:pointer;text-decoration:underline}
/* ---------- check-in signature ---------- */
.checkin-btn{
  width:170px;height:170px;border-radius:50%;margin:8px auto;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;background:var(--navy);color:var(--white);
  font-size:17px;font-weight:700;box-shadow:0 6px 24px rgba(27,58,92,.35);
  border:5px solid var(--teal);transition:transform .12s ease;
}
.checkin-btn:hover{transform:scale(1.04)}
.checkin-btn:active{transform:scale(.97)}
.checkin-btn small{font-weight:400;font-size:12px;color:var(--teal)}
.checkin-btn:disabled{background:#8b98a5;border-color:#c6cfd6;box-shadow:none;transform:none;cursor:default}
@keyframes coinpop{0%{transform:translateY(0) scale(.6);opacity:1}100%{transform:translateY(-90px) scale(1.2);opacity:0}}
.coin{position:fixed;font-size:26px;pointer-events:none;animation:coinpop .9s ease-out forwards;z-index:999}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;
  padding:12px 22px;border-radius:99px;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:998;
  border:2px solid var(--teal)}
/* ---------- modal ---------- */
#modalBack{position:fixed;inset:0;background:rgba(27,58,92,.45);display:flex;align-items:center;justify-content:center;z-index:900;padding:16px}
#modalBox{background:var(--white);border-radius:16px;max-width:480px;width:100%;padding:26px;max-height:90vh;overflow-y:auto}
#modalBox h3{margin-bottom:8px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.alertline{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:10px;background:#fdf3e3;border-left:4px solid var(--amber);margin-bottom:8px;font-size:14px}
.alertline.red{background:#f9e9e7;border-left-color:var(--red)}
.subtext{font-size:13px;color:var(--muted)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
.leader-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;margin-bottom:8px;background:var(--cream)}
.leader-row.first{background:var(--teal);color:var(--navy)}
.leader-rank{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;width:34px;text-align:center}
.leader-pts{margin-left:auto;font-weight:700}
@media(prefers-reduced-motion:reduce){.coin{animation:none;display:none}.checkin-btn{transition:none}}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="authView">
  <div class="authcard">
    <h1>Service <span style="color:#5ea892">Tracker</span></h1>
    <div class="sub" id="authSub">Sign in to your studio</div>

    <div id="loginForm">
      <label>Email</label><input id="liEmail" type="email" autocomplete="email">
      <label>Password</label><input id="liPass" type="password" autocomplete="current-password">
      <button class="btn" onclick="doLogin()">Sign in</button>
      <div class="authlinks">
        <a onclick="showAuth('forgot')">Forgot password?</a> &nbsp;·&nbsp;
        <a onclick="showAuth('signup')">Create account</a>
      </div>
    </div>

    <div id="signupForm" class="hidden">
      <label>Full name</label><input id="suName">
      <label>Email</label><input id="suEmail" type="email">
      <label>Password</label><input id="suPass" type="password" autocomplete="new-password">
      <label>Invite code <span class="subtext">(from your studio owner — first account ever needs none)</span></label>
      <input id="suCode" placeholder="e.g. a1b2c3d4">
      <button class="btn" onclick="doSignup()">Create account</button>
      <div class="authlinks"><a onclick="showAuth('login')">Back to sign in</a></div>
    </div>

    <div id="forgotForm" class="hidden">
      <label>Email</label><input id="fpEmail" type="email">
      <button class="btn" onclick="doForgot()">Send reset link</button>
      <div class="authlinks"><a onclick="showAuth('login')">Back to sign in</a></div>
    </div>

    <div id="resetForm" class="hidden">
      <label>New password</label><input id="rpPass" type="password" autocomplete="new-password">
      <button class="btn" onclick="doReset()">Set new password</button>
    </div>

    <div id="authMsg" class="subtext" style="margin-top:12px"></div>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="appView" class="hidden">
  <div id="topbar">
    <div class="brand">Service <span>Tracker</span></div>
    <nav id="mainNav"></nav>
    <button class="btn-sm btn-ghost" style="color:#cfdbe6;border-color:#cfdbe6" onclick="doLogout()">Log out</button>
  </div>
  <div id="main"></div>
</div>

<div id="modalBack" class="hidden"><div id="modalBox"></div></div>

<script>
/* ================= CONFIG — paste your Supabase project values ================= */
const SUPABASE_URL = "https://jgkgdtfutvrrylszikzf.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_...your full key...";
/* =============================================================================== */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let ME = null;            // my profile row
let SETTINGS = null;
let TERMS = [], CLIENTS = [], PROFILES = [], SERVICES = [], REQUESTS = [], NOTIFS = [];
let currentPage = "dashboard";

/* ---------------- helpers ---------------- */
const $ = id => document.getElementById(id);
const esc = s => (s??"").toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDT = d => new Date(d).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
const fmtD  = d => new Date(d).toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'});
const monthKey = d => { const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"); };
const nowMonth = () => monthKey(new Date());
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(), 3200); }
function haversine(a,b,c,d){ const R=6371000,r=x=>x*Math.PI/180;
  const dLat=r(c-a), dLng=r(d-b);
  const h=Math.sin(dLat/2)**2 + Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLng/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(h))); }
const isOwner = () => ME && ME.role === 'owner';
const workerWord = p => p.worker_type === 'contractor' ? 'contractor' : 'employee';
const payWord = p => p.worker_type === 'contractor' ? 'invoice-ready total' : 'payroll total';

/* Contractor vs employee language for tallies */
function payLangHeading(p){
  return p.worker_type === 'contractor'
    ? 'Services completed (replaces your invoice — this is what you\'ll be paid on)'
    : 'Services completed (recorded for payroll)';
}

/* ---------------- AUTH ---------------- */
function showAuth(which){
  ['loginForm','signupForm','forgotForm','resetForm'].forEach(f=>$(f).classList.add('hidden'));
  $(which+'Form').classList.remove('hidden');
  $('authSub').textContent = {login:'Sign in to your studio', signup:'Join with your invite code',
    forgot:'We\'ll email you a reset link', reset:'Choose a new password'}[which];
  $('authMsg').textContent = '';
}
async function doLogin(){
  $('authMsg').textContent = 'Signing in…';
  const {error} = await sb.auth.signInWithPassword({email:$('liEmail').value.trim(), password:$('liPass').value});
  if(error){ $('authMsg').textContent = error.message; return; }
}
async function doSignup(){
  const code = $('suCode').value.trim();
  $('authMsg').textContent = 'Checking invite code…';
  const {data:ok, error:ve} = await sb.rpc('validate_invite', {code});
  if(ve || !ok){ $('authMsg').textContent = 'That invite code isn\'t valid. Ask your studio owner for the current one.'; return; }
  const {error} = await sb.auth.signUp({ email:$('suEmail').value.trim(), password:$('suPass').value,
    options:{ data:{ name: $('suName').value.trim() } } });
  if(error){ $('authMsg').textContent = error.message; return; }
  $('authMsg').textContent = 'Account created. Check your email to confirm, then sign in.';
  showAuth('login');
}
async function doForgot(){
  const {error} = await sb.auth.resetPasswordForEmail($('fpEmail').value.trim(), {redirectTo: location.href.split('#')[0]});
  $('authMsg').textContent = error ? error.message : 'Reset link sent — check your email.';
}
async function doReset(){
  const {error} = await sb.auth.updateUser({password: $('rpPass').value});
  $('authMsg').textContent = error ? error.message : 'Password updated. You\'re signed in.';
  if(!error) boot();
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }

sb.auth.onAuthStateChange(async (event, session)=>{
  if(event === 'PASSWORD_RECOVERY'){ $('authView').classList.remove('hidden'); $('appView').classList.add('hidden'); showAuth('reset'); return; }
  if(session && event === 'SIGNED_IN') boot();
});

/* ---------------- BOOT + DATA ---------------- */
async function boot(){
  const {data:{user}} = await sb.auth.getUser();
  if(!user) return;
  await sb.from('profiles').update({last_login: new Date().toISOString(), email:user.email}).eq('id', user.id);
  await loadAll(user.id);
  $('authView').classList.add('hidden');
  $('appView').classList.remove('hidden');
  buildNav();
  go(isOwner() ? 'dashboard' : 'today');
  if(isOwner()) generateOwnerAlerts();
}
async function loadAll(uid){
  const [p, s, t, c, pr, sv, rq, nf] = await Promise.all([
    sb.from('profiles').select('*').eq('id', uid).single(),
    sb.from('settings').select('*').eq('id',1).single(),
    sb.from('terms').select('*').order('start_date'),
    sb.from('clients').select('*').order('name'),
    sb.from('profiles').select('*').order('name'),
    sb.from('services').select('*').order('scheduled_start'),
    sb.from('reschedule_requests').select('*').order('created_at',{ascending:false}),
    sb.from('notifications').select('*').eq('read',false).order('created_at',{ascending:false}).limit(60),
  ]);
  ME = p.data; SETTINGS = s.data; TERMS = t.data||[]; CLIENTS = c.data||[];
  PROFILES = pr.data||[]; SERVICES = sv.data||[]; REQUESTS = rq.data||[]; NOTIFS = nf.data||[];
}
async function refresh(){ await loadAll(ME.id); go(currentPage); }
async function touchActivity(){
  await sb.from('profiles').update({last_service_update:new Date().toISOString()}).eq('id', ME.id);
}

/* ---------------- NAV ---------------- */
function buildNav(){
  const owner = [['dashboard','Dashboard'],['schedule','Schedule'],['clients','Clients'],
                 ['team','Specialists'],['leaderboard','Leaderboard'],['settings','Settings']];
  const spec  = [['today','Today'],['myschedule','My Schedule'],['leaderboard','Leaderboard']];
  $('mainNav').innerHTML = (isOwner()?owner:spec)
    .map(([k,l])=>`<button data-p="${k}" onclick="go('${k}')">${l}</button>`).join('');
}
function go(page){
  currentPage = page;
  document.querySelectorAll('#mainNav button').forEach(b=>b.classList.toggle('active', b.dataset.p===page));
  const fn = {dashboard:renderDashboard, schedule:renderSchedule, clients:renderClients, team:renderTeam,
    leaderboard:renderLeaderboard, settings:renderSettings, today:renderToday, myschedule:renderMySchedule}[page];
  if(fn) fn();
}

/* ---------------- QUOTA LOGIC ---------------- */
function allowanceForMonth(client, mk){
  const o = client.month_overrides || {};
  return (mk in o) ? Number(o[mk]) : client.allowance_per_month;
}
function countsTowardAllowance(sv){
  return !sv.is_trial && !sv.is_reschedule && (sv.status==='scheduled' || sv.status==='completed');
}
function clientMonthUsed(clientId, mk){
  return SERVICES.filter(s=>s.client_id===clientId && monthKey(s.scheduled_start)===mk && countsTowardAllowance(s)).length;
}
function termFor(date){
  const d = new Date(date).toISOString().slice(0,10);
  return TERMS.find(t=>t.start_date<=d && d<=t.end_date) || null;
}
function monthsInTerm(t){
  const out=[]; let d=new Date(t.start_date+"T00:00:00"); const end=new Date(t.end_date+"T00:00:00");
  while(d<=end){ out.push(monthKey(d)); d=new Date(d.getFullYear(), d.getMonth()+1, 1); }
  return out;
}
function clientTermNumbers(client, date){
  const t = termFor(date); if(!t) return null;
  const mks = monthsInTerm(t);
  const allowed = mks.reduce((n,mk)=>n+allowanceForMonth(client,mk),0);
  const used = SERVICES.filter(s=>s.client_id===client.id && countsTowardAllowance(s) &&
    termFor(s.scheduled_start)?.id===t.id).length;
  return {term:t, allowed, used, left: allowed-used};
}
/* Check on create: returns {ok, warn, block, msg} */
function quotaCheck(client, dateISO, isReschedule, isTrial){
  if(isReschedule || isTrial) return {ok:true};
  const mk = monthKey(dateISO);
  const monthAllowed = allowanceForMonth(client, mk);
  const monthUsed = clientMonthUsed(client.id, mk);
  const tn = client.term_averaging ? clientTermNumbers(client, dateISO) : null;
  if(tn && tn.left <= 0)
    return {ok:false, block:true, msg:`${client.name} has used all ${tn.allowed} services allowed for ${tn.term.name}. Only a reschedule can be added.`};
  if(monthUsed >= monthAllowed){
    if(tn) return {ok:true, warn:true, msg:`Over the monthly allowance (${monthUsed}/${monthAllowed} for this month) but within ${tn.term.name} (${tn.used}/${tn.allowed}) — averaging applies.`};
    return {ok:false, block:true, msg:`${client.name} is at the monthly allowance (${monthUsed}/${monthAllowed}). Mark it as a reschedule if it's replacing a canceled service.`};
  }
  return {ok:true};
}

/* ---------------- CHECK-IN + CHA-CHING ---------------- */
function chaChing(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[1318.5,0],[1760,0.09]].forEach(([f,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f, ctx.currentTime+t);
      o.frequency.exponentialRampToValueAtTime(f*1.5, ctx.currentTime+t+0.18);
      g.gain.setValueAtTime(0.001, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.5);
      o.connect(g).connect(ctx.destination); o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.55);
    });
  }catch(e){}
  for(let i=0;i<7;i++){ const c=document.createElement('div'); c.className='coin'; c.textContent='🪙';
    c.style.left=(45+Math.random()*10)+'%'; c.style.bottom='40%'; c.style.animationDelay=(i*70)+'ms';
    document.body.appendChild(c); setTimeout(()=>c.remove(),1200); }
}
function checkinWindow(sv){
  const start = new Date(sv.scheduled_start).getTime();
  const end = start + sv.duration_min*60000;
  const graceEnd = end + SETTINGS.grace_period_min*60000;
  const pointsEnd = end + SETTINGS.points_window_min*60000;
  return {start, end, graceEnd, pointsEnd};
}
async function doCheckin(svId){
  const sv = SERVICES.find(s=>s.id===svId); if(!sv) return;
  const client = CLIENTS.find(c=>c.id===sv.client_id);
  const w = checkinWindow(sv);
  const now = Date.now();
  if(now < w.start - 15*60000){ toast('A little early — check-in opens 15 minutes before the start time.'); return; }
  if(now > w.graceEnd){
    // still allow logging, but flagged late
    if(!confirm('The grace period has passed, so this will be recorded as a late check-in. Log it anyway?')) return;
  }
  const target = SETTINGS.mode==='location'
    ? {lat:SETTINGS.business_lat, lng:SETTINGS.business_lng, label:'the studio'}
    : {lat:client?.lat, lng:client?.lng, label:client?.name + '\'s location'};

  toast('Getting your location…');
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat, longitude:lng} = pos.coords;
    let dist = null, onSite = true;
    if(target.lat!=null && target.lng!=null){
      dist = haversine(lat,lng,target.lat,target.lng);
      onSite = dist <= SETTINGS.checkin_radius_m;
    }
    if(!onSite && !confirm(`You look ${dist}m from ${target.label} (limit ${SETTINGS.checkin_radius_m}m). Check in anyway? It will be flagged.`)) return;

    const onTime = now <= w.graceEnd;
    const inPointsWindow = now <= w.pointsEnd;
    openModal(`
      <h3>How did it go?</h3>
      <p class="subtext">A quick note is saved with this check-in.</p>
      <label>Notes about the service</label>
      <textarea id="ciNotes" rows="3" placeholder="e.g. Worked on scales, great progress on the recital piece"></textarea>
      <div class="modal-actions">
        <button class="btn-ghost btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-teal" onclick="finishCheckin('${svId}',${lat},${lng},${dist===null?'null':dist},${onTime},${inPointsWindow},${onSite})">Check in ✓</button>
      </div>`);
  }, err=>{
    toast('Couldn\'t get your location — check that location access is allowed for this site.');
  }, {enableHighAccuracy:true, timeout:12000});
}
async function finishCheckin(svId, lat, lng, dist, onTime, inPointsWindow, onSite){
  const notes = $('ciNotes').value;
  const {error} = await sb.from('services').update({
    status:'completed', checkin_at:new Date().toISOString(), checkin_lat:lat, checkin_lng:lng,
    checkin_distance_m:dist, on_time:onTime, notes, updated_at:new Date().toISOString()
  }).eq('id', svId);
  closeModal();
  if(error){ toast('Something went wrong saving the check-in: '+error.message); return; }
  await touchActivity();
  if(inPointsWindow && onSite){
    const pts = SETTINGS.points_per_checkin;
    await sb.from('points_ledger').insert({specialist_id:ME.id, service_id:svId, points:pts, reason:'Checked in on time'});
    await sb.from('profiles').update({points: (ME.points||0)+pts}).eq('id', ME.id);
    chaChing();
    toast(`Cha-ching! +${pts} points 🪙`);
  } else {
    toast('Checked in and recorded ✓');
  }
  await refresh();
}

/* ---------------- CANCEL / RESCHEDULE ---------------- */
function canCancel(sv){
  if(isOwner()) return true;
  if(ME.perm_cancel==='yes') return true;
  if(ME.perm_cancel==='log_only') return new Date(sv.scheduled_start) <= new Date(); // can log past ones only
  return false;
}
function openCancel(svId){
  const sv = SERVICES.find(s=>s.id===svId);
  openModal(`

/* ---------------- OWNER ALERTS (in-app; edge function emails) ---------------- */
async function generateOwnerAlerts(){
  const inserts = [];
  const now = new Date();
  // Overdue: scheduled services whose grace window has fully passed with no update
  SERVICES.filter(s=>s.status==='scheduled').forEach(s=>{
    const w = checkinWindow(s);
    if(now.getTime() > w.graceEnd){
      const sp = PROFILES.find(p=>p.id===s.specialist_id);
      const cl = CLIENTS.find(c=>c.id===s.client_id);
      const msg = `Not updated: ${cl?.name||'client'} with ${sp?.name||'specialist'} (${fmtDT(s.scheduled_start)}) — no check-in, cancel, or reschedule recorded.`;
      if(!NOTIFS.some(n=>n.message===msg)) inserts.push({kind:'overdue', message:msg, specialist_id:null});
    }
  });
  // Over allowance this month
  CLIENTS.forEach(c=>{
    const mk = nowMonth();
    const used = clientMonthUsed(c.id, mk), allowed = allowanceForMonth(c, mk);
    const tn = c.term_averaging ? clientTermNumbers(c, new Date()) : null;
    const overTerm = tn && tn.used > tn.allowed;
    if((used > allowed && !tn) || overTerm){
      const msg = `${c.name} is over the allowance: ${used}/${allowed} this month${tn?` and ${tn.used}/${tn.allowed} for ${tn.term.name}`:''}.`;
      if(!NOTIFS.some(n=>n.message===msg)) inserts.push({kind:'over_allowance', message:msg, specialist_id:null});
    }
  });
  if(inserts.length){ await sb.from('notifications').insert(inserts); NOTIFS = [...inserts.map(i=>({...i,read:false})), ...NOTIFS]; }
}

function studioNumbers(mk){
  const inMonth = SERVICES.filter(s=>monthKey(s.scheduled_start)===mk);
  return {
    taught: inMonth.filter(s=>s.status==='completed').length,
    canceled: inMonth.filter(s=>s.status==='canceled').length,
    rescheduled: inMonth.filter(s=>s.status==='rescheduled').length,
    outstanding: SERVICES.filter(s=>s.status==='needs_reschedule').length,
    trials: inMonth.filter(s=>s.is_trial).length,
    scheduled: inMonth.filter(s=>s.status==='scheduled').length,
  };
}
function specialistNumbers(pid){
  const mk = nowMonth();
  const mine = SERVICES.filter(s=>s.specialist_id===pid);
  const doneMonth = mine.filter(s=>s.status==='completed' && monthKey(s.scheduled_start)===mk).length;
  const leftMonth = mine.filter(s=>s.status==='scheduled' && monthKey(s.scheduled_start)===mk).length;
  const t = termFor(new Date());
  let doneTerm=0, leftTerm=0;
  if(t){ mine.forEach(s=>{ const tt=termFor(s.scheduled_start); if(tt && tt.id===t.id){
    if(s.status==='completed') doneTerm++; if(s.status==='scheduled') leftTerm++; } }); }
  return {doneMonth, leftMonth, doneTerm, leftTerm, term:t};
}

  const p = PROFILES.find(x=>x.id===id);
  openModal(`
    <h3>${esc(p.name||p.email)}</h3>
    <label>Worker type <span class="subtext">(changes the pay language they see)</span></label>
    <select id="spType"><option value="contractor" ${p.worker_type==='contractor'?'selected':''}>Contractor — services replace invoices</option>
    <option value="employee" ${p.worker_type==='employee'?'selected':''}>Employee — services feed payroll</option></select>
    <label>Cancel permission</label>
    <select id="spCancel"><option value="yes" ${p.perm_cancel==='yes'?'selected':''}>Can cancel any of their services</option>
    <option value="log_only" ${p.perm_cancel==='log_only'?'selected':''}>Log only — can record past cancellations, not cancel upcoming</option>
    <option value="no" ${p.perm_cancel==='no'?'selected':''}>No — must contact the studio</option></select>
    <label>Reschedule permission</label>
    <select id="spResched"><option value="full" ${p.perm_reschedule==='full'?'selected':''}>Full — can create and place on the calendar</option>
    <option value="request" ${p.perm_reschedule==='request'?'selected':''}>Request — submits a form for approval</option>
    <option value="none" ${p.perm_reschedule==='none'?'selected':''}>None</option></select>
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px"><input type="checkbox" id="spEdit" style="width:auto" ${p.perm_edit_own?'checked':''}> Can edit and change services on their own schedule</label>
    <label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="spActive" style="width:auto" ${p.active?'checked':''}> Active</label>
    <div class="modal-actions"><button class="btn-ghost btn-sm" onclick="closeModal()">Back</button>
    <button class="btn btn-teal" onclick="saveSpecialist('${id}')">Save</button></div>`);
}
async function saveSpecialist(id){
  const {error} = await sb.from('profiles').update({
    worker_type:$('spType').value, perm_cancel:$('spCancel').value,
    perm_reschedule:$('spResched').value, perm_edit_own:$('spEdit').checked, active:$('spActive').checked
  }).eq('id',id);
  closeModal(); if(error){ toast(error.message); return; }
  toast('Saved ✓'); await refresh();
}
function openTransfer(fromId){
  const from = PROFILES.find(p=>p.id===fromId);
  const movable = SERVICES.filter(s=>s.specialist_id===fromId && (s.status==='scheduled'||s.status==='needs_reschedule'));
  openModal(`
    <h3>Transfer services from ${esc(from.name||from.email)}</h3>
    <p class="subtext">Moves outstanding and upcoming services to another specialist — for mid-year teacher switches.</p>
    <label>Transfer to</label>
    <select id="trTo">${PROFILES.filter(p=>p.role==='specialist'&&p.id!==fromId&&p.active).map(p=>`<option value="${p.id}">${esc(p.name||p.email)}</option>`).join('')}</select>
    <label>Select services</label>
    <div style="max-height:220px;overflow-y:auto">
    ${movable.map(s=>{ const cl=CLIENTS.find(c=>c.id===s.client_id);
      return `<label style="display:flex;gap:8px;align-items:center;font-size:14px;margin:6px 0;color:var(--ink)">
      <input type="checkbox" class="trPick" value="${s.id}" style="width:auto" checked>
      ${esc(cl?.name)} — ${fmtDT(s.scheduled_start)} <span class="pill ${s.status}">${s.status.replace('_',' ')}</span></label>`; }).join('') || '<p class="subtext">No outstanding or upcoming services.</p>'}
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="trClients" style="width:auto" checked> Also reassign these clients to the new specialist</label>
    <div class="modal-actions"><button class="btn-ghost btn-sm" onclick="closeModal()">Back</button>
    <button class="btn btn-teal" onclick="doTransfer('${fromId}')">Transfer</button></div>`);
}
async function doTransfer(fromId){
  const toId = $('trTo').value;
  const ids = [...document.querySelectorAll('.trPick:checked')].map(x=>x.value);
  if(!ids.length){ toast('Pick at least one service'); return; }
  const {error} = await sb.from('services').update({specialist_id:toId, updated_at:new Date().toISOString()}).in('id', ids);
  if(error){ toast(error.message); return; }
  if($('trClients').checked){
    const clientIds = [...new Set(SERVICES.filter(s=>ids.includes(s.id)).map(s=>s.client_id))];
    await sb.from('clients').update({specialist_id:toId}).in('id', clientIds);
  }
  const to = PROFILES.find(p=>p.id===toId);
  await sb.from('notifications').insert({kind:'transfer', message:`${ids.length} service(s) were transferred to you.`, specialist_id:toId});
  closeModal(); toast(`Transferred ${ids.length} service(s) to ${to.name||to.email} ✓`); await refresh();
}

async function saveSettings(){
  const {error} = await sb.from('settings').update({
    business_name:$('stName').value, mode:$('stMode').value,
    business_address:$('stAddr')?.value||SETTINGS.business_address,
    business_lat: $('stLat')?.value?Number($('stLat').value):SETTINGS.business_lat,
    business_lng: $('stLng')?.value?Number($('stLng').value):SETTINGS.business_lng,
    checkin_radius_m:Number($('stRadius').value), grace_period_min:Number($('stGrace').value),
    points_window_min:Number($('stPtsWin').value), points_per_checkin:Number($('stPts').value),
    reminder_after_hours:Number($('stRem1').value), reminder_repeat_hours:Number($('stRem2').value),
    payroll_deadline_day:Number($('stPayday').value), trial_paid_default:$('stTrialPaid').checked,
    updated_at:new Date().toISOString()
  }).eq('id',1);

  toast('Settings saved ✓'); await refresh();
}
async function addTerm(){
  if(!$('tmName').value||!$('tmStart').value||!$('tmEnd').value){ toast('Fill in name, start, and end'); return; }
  await sb.from('terms').insert({name:$('tmName').value, start_date:$('tmStart').value, end_date:$('tmEnd').value});

}
async function delTerm(id){ if(confirm('Delete this term?')){ await sb.from('terms').delete().eq('id',id); await refresh(); } }

/* ---------------- EXPORTS ---------------- */
function downloadCSV(name, rows){
  const csv = rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = name; a.click();
}
function exportServicesCSV(){
  const rows = [['Date','Client','Specialist','Status','Trial','Trial paid','Reschedule','Checked in at','On time','Distance (m)','Canceled by','Canceled at','Reason','Notes']];
  SERVICES.forEach(s=>{ const cl=CLIENTS.find(c=>c.id===s.client_id), sp=PROFILES.find(p=>p.id===s.specialist_id);
    rows.push([new Date(s.scheduled_start).toLocaleString(), cl?.name, sp?.name||sp?.email, s.status,
      s.is_trial?'yes':'', s.is_trial?(s.trial_paid?'paid':'free'):'', s.is_reschedule?'yes':'',
      s.checkin_at?new Date(s.checkin_at).toLocaleString():'', s.on_time===false?'LATE':(s.on_time?'yes':''),
      s.checkin_distance_m??'', s.canceled_by??'', s.canceled_at?new Date(s.canceled_at).toLocaleString():'', s.cancel_reason, s.notes]); });
  downloadCSV('services.csv', rows);
}
function exportTallyCSV(){
  const mk = nowMonth();
  const rows = [['Specialist','Type','Completed this month','Left this month','Completed this term','Left this term','Points','Last login','Last update']];
  PROFILES.filter(p=>p.role==='specialist').forEach(p=>{ const s=specialistNumbers(p.id);
    rows.push([p.name||p.email, p.worker_type, s.doneMonth, s.leftMonth, s.term?s.doneTerm:'', s.term?s.leftTerm:'',
      p.points||0, p.last_login?new Date(p.last_login).toLocaleString():'', p.last_service_update?new Date(p.last_service_update).toLocaleString():'']); });
  downloadCSV('specialist-tally-'+mk+'.csv', rows);
}
